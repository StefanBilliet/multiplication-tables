name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "*"
          check-latest: true
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run check

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
